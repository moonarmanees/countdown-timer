<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <style>
    /* ── Reset & base ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #111827;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f3f4f6;
      gap: 1.5rem;
    }

    h1 {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #6b7280;
    }

    /* ── Ring + display ───────────────────────────── */
    .ring-wrapper {
      position: relative;   /* anchor for the absolute display overlay */
      width: 280px;
      height: 280px;
    }

    /* SVG is rotated so the arc starts at the top (12 o'clock) */
    .ring-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    /* Dim background track — always full circle */
    .ring-track {
      fill: none;
      stroke: #1f2937;
      stroke-width: 14;
    }

    /* Foreground arc — JS sets stroke-dashoffset to drain it */
    .ring-progress {
      fill: none;
      stroke: #3b82f6;          /* blue */
      stroke-width: 14;
      stroke-linecap: round;
      /* dashoffset transition matches the 1-second tick so it glides smoothly */
      transition: stroke-dashoffset 0.9s linear, stroke 0.4s ease;
    }

    /* Large time readout centred inside the ring */
    .timer-display {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      font-weight: 200;
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums; /* digits don't jump width */
      transition: color 0.4s ease;
    }

    /* Pulse animation played when the timer finishes */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    .timer-display.done { animation: pulse 1s ease-in-out infinite; }

    /* ── Input row ────────────────────────────────── */
    .inputs {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .input-group label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6b7280;
    }

    .inputs input[type="number"] {
      width: 64px;
      padding: 0.45rem 0.5rem;
      font-size: 1.3rem;
      text-align: center;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #f3f4f6;
      outline: none;
      /* hide browser spin arrows — they look odd here */
      -moz-appearance: textfield;
    }
    .inputs input[type="number"]::-webkit-inner-spin-button,
    .inputs input[type="number"]::-webkit-outer-spin-button { display: none; }
    .inputs input[type="number"]:focus { border-color: #6366f1; }
    .inputs input[type="number"]:disabled { opacity: 0.4; cursor: not-allowed; }

    .colon {
      font-size: 1.8rem;
      font-weight: 200;
      color: #4b5563;
      margin-bottom: 1rem; /* optical alignment with inputs */
    }

    /* ── Buttons ──────────────────────────────────── */
    .controls { display: flex; gap: 0.75rem; }

    button {
      padding: 0.55rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.95); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    #btn-start  { background: #6366f1; color: #fff; }
    #btn-pause  { background: #374151; color: #d1d5db; }
    #btn-reset  { background: #1f2937; color: #6b7280; }
  </style>
</head>
<body>

  <h1>Countdown Timer</h1>

  <!-- ── Ring + MM:SS overlay ── -->
  <div class="ring-wrapper">
    <svg class="ring-svg" viewBox="0 0 280 280">
      <!-- Static grey track — full circle always visible -->
      <circle class="ring-track" cx="140" cy="140" r="120" />
      <!-- Progress arc — JS animates stroke-dashoffset to drain this -->
      <circle class="ring-progress" id="ring" cx="140" cy="140" r="120" />
    </svg>
    <div class="timer-display" id="display">00:00</div>
  </div>

  <!-- ── Time inputs ── -->
  <div class="inputs">
    <div class="input-group">
      <label for="inp-min">Min</label>
      <input type="number" id="inp-min" min="0" max="99" value="0">
    </div>
    <span class="colon">:</span>
    <div class="input-group">
      <label for="inp-sec">Sec</label>
      <input type="number" id="inp-sec" min="0" max="59" value="0">
    </div>
  </div>

  <!-- ── Control buttons ── -->
  <div class="controls">
    <button id="btn-start">Start</button>
    <button id="btn-pause">Pause</button>
    <button id="btn-reset">Reset</button>
  </div>

  <script>
    // ── Constants ────────────────────────────────────
    const RADIUS = 120;
    const CIRCUMFERENCE = 2 * Math.PI * RADIUS; // ≈ 753.98 px

    // ── DOM refs ─────────────────────────────────────
    const ringEl   = document.getElementById('ring');
    const displayEl = document.getElementById('display');
    const inpMin   = document.getElementById('inp-min');
    const inpSec   = document.getElementById('inp-sec');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnReset = document.getElementById('btn-reset');

    // ── Timer state ──────────────────────────────────
    let totalSecs  = 0;   // seconds when Start was first pressed
    let remaining  = 0;   // seconds left right now
    let timerId    = null; // setInterval handle; null when stopped
    let running    = false;

    // Configure the ring: dasharray = full circumference so the stroke
    // is one continuous segment; dashoffset shifts it to hide/show the arc.
    ringEl.style.strokeDasharray = CIRCUMFERENCE;
    setRingOffset(CIRCUMFERENCE); // start with an empty ring

    // ── Helpers ──────────────────────────────────────

    // Pad a number to 2 digits, e.g. 7 → "07"
    function pad(n) { return String(n).padStart(2, '0'); }

    // Clamp val between lo and hi
    function clamp(val, lo, hi) { return Math.min(Math.max(val, lo), hi); }

    // Set the ring progress directly (no transition delay on reset)
    function setRingOffset(offset, instant = false) {
      if (instant) ringEl.style.transition = 'none';
      ringEl.style.strokeDashoffset = offset;
      if (instant) {
        // Force reflow so the transition suppression takes effect before re-enabling
        ringEl.getBoundingClientRect();
        ringEl.style.transition = '';
      }
    }

    // Redraw the display text and ring arc from `remaining` and `totalSecs`
    function render() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      displayEl.textContent = `${pad(m)}:${pad(s)}`;

      // dashoffset 0 = full ring; CIRCUMFERENCE = empty ring
      const offset = totalSecs > 0
        ? CIRCUMFERENCE * (1 - remaining / totalSecs)
        : CIRCUMFERENCE;
      setRingOffset(offset);

      // Colour the ring red and pulse the display when done
      if (remaining === 0 && totalSecs > 0) {
        ringEl.style.stroke = '#ef4444';
        displayEl.classList.add('done');
        displayEl.style.color = '#ef4444';
        // Also update the tab title so you can see it while in another tab
        document.title = 'Done! — Countdown Timer';
      } else {
        ringEl.style.stroke = '';
        displayEl.classList.remove('done');
        displayEl.style.color = '';
        document.title = remaining > 0
          ? `${pad(m)}:${pad(s)} — Countdown Timer`
          : 'Countdown Timer';
      }
    }

    // ── Core timer logic ─────────────────────────────

    function tick() {
      if (remaining <= 0) {
        // Stop the interval; render handles the "done" visual
        clearInterval(timerId);
        timerId = null;
        running = false;
        setButtonStates();
        render();
        return;
      }
      remaining--;
      render();
    }

    function start() {
      if (running) return;

      // Read the inputs only when starting fresh (not resuming after pause)
      if (remaining === 0 && totalSecs === 0) {
        const m = clamp(parseInt(inpMin.value, 10) || 0, 0, 99);
        const s = clamp(parseInt(inpSec.value, 10) || 0, 0, 59);
        totalSecs = m * 60 + s;
        remaining = totalSecs;
      }

      if (remaining <= 0) return; // nothing to count

      running = true;
      setButtonStates();
      render(); // draw immediately so there's no 1-second lag on first tick
      timerId = setInterval(tick, 1000);
    }

    function pause() {
      if (!running) return;
      clearInterval(timerId);
      timerId = null;
      running = false;
      setButtonStates();
    }

    function reset() {
      clearInterval(timerId);
      timerId  = null;
      running  = false;
      totalSecs = 0;
      remaining = 0;

      // Snap inputs back to zero
      inpMin.value = '0';
      inpSec.value = '0';

      // Reset visual state instantly (no glide animation on reset)
      setRingOffset(CIRCUMFERENCE, /* instant */ true);
      displayEl.textContent = '00:00';
      displayEl.classList.remove('done');
      displayEl.style.color = '';
      ringEl.style.stroke   = '';
      document.title = 'Countdown Timer';

      setButtonStates();
    }

    // Enable/disable buttons based on current state
    function setButtonStates() {
      btnStart.disabled = running;
      btnPause.disabled = !running;
      btnReset.disabled = running; // prevent reset mid-run (use pause first)
    }

    // ── Live preview while editing inputs ────────────
    // When the timer is idle, typing in the inputs updates the display in real time.
    function onInputChange() {
      if (running) return; // ignore edits while running
      const m = clamp(parseInt(inpMin.value, 10) || 0, 0, 99);
      const s = clamp(parseInt(inpSec.value, 10) || 0, 0, 59);
      totalSecs = m * 60 + s;
      remaining = totalSecs;
      // Reset done styling if user is setting a new time
      displayEl.classList.remove('done');
      displayEl.style.color = '';
      ringEl.style.stroke   = '';
      render();
    }

    inpMin.addEventListener('input', onInputChange);
    inpSec.addEventListener('input', onInputChange);

    // Clamp the seconds field to 0–59 on blur
    inpSec.addEventListener('blur', () => {
      inpSec.value = clamp(parseInt(inpSec.value, 10) || 0, 0, 59);
    });

    // ── Wire up buttons ──────────────────────────────
    btnStart.addEventListener('click', start);
    btnPause.addEventListener('click', pause);
    btnReset.addEventListener('click', reset);

    // Keyboard shortcut: Space to start/pause, R to reset
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return; // don't fire while typing
      if (e.key === ' ') { e.preventDefault(); running ? pause() : start(); }
      if (e.key === 'r' || e.key === 'R') reset();
    });

    // Initial button state
    setButtonStates();
  </script>

</body>
</html>
